<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Report</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>
    body {font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f6f8fa; padding: 1.5rem; color: #2c3e50;}
    .header {display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;}
    .header img {height: 40px;}
    h1 {color: #2c3e50; font-weight: 500; font-size: 1.75rem; margin: 0;}
    .controls {display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; background: #ffffff; padding: 0.8rem 1rem; border-radius: 8px; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04); margin-bottom: 1rem;}
    .left-controls {display: flex; flex-wrap: nowrap; gap: 0.75rem; align-items: center;}
    .controls input[type="file"] {max-width: 220px;}
    .controls input[type="file"],
    .controls input[type="date"],
    .controls button {padding: 0.4rem 0.8rem; font-size: 0.9rem; border: 1px solid #ccc; border-radius: 4px;}
    button {background-color: #5a9bd5; color: white; border: none; border-radius: 4px; cursor: pointer; transition: background-color 0.2s ease;}
    button:hover {background-color: #4a89c2;}
    #totalOrders{font-size:1rem;margin:0.75rem 0 1rem;color:#2c3e50;}
    table{width:100%;border-collapse:collapse;background-color:white;box-shadow:0 1px 4px rgba(0,0,0,0.03);border-radius:6px;overflow:hidden;}
    th{background-color:#2c3e50;color:white;padding:0.6rem 0.75rem;text-align:left;white-space:nowrap;font-weight:500;}td{padding:0.6rem 0.75rem;border-top:1px solid #e1e5ea;}
    tr:nth-child(even){background-color:#f9fbfc;}
  </style>
</head>

<body>
  <div class="header">
    <h1>Sales Report</h1>
    <div><small>By: Christine Anastacio</small></div>
  </div>

  <div class="controls">
    <div class="left-controls">
      <input type="file" id="fileInput" multiple accept=".xlsx, .xls, .csv" />
      <label for="dateFilter" style="font-size: 0.9rem;">Order Date:</label>
      <input type="date" id="dateFilter" />
      <button onclick="filterByDate()">Filter</button>
      <button onclick="resetFilter()">Reset</button> <!-- NEW Reset button -->
    </div>
    <button onclick="exportToExcel()">Export to Excel</button>
  </div>

  <div id="totalOrders">Total Orders: 0</div>

  <table id="reportTable">
    <thead>
      <tr>
        <th>Order Date</th>
        <th>Ship From</th>
        <th>Order Number</th>
        <th>Item SKU</th>
        <th>Quantity</th>
        <th>Custom Field 1</th>
        <th>Custom Field 2</th>
        <th>Custom Field 3</th>
        <th>Order Total</th>
        <th>Recipient</th>
        <th>Rate</th>
        <th>Service</th>
        <th>Tracking Number</th>
        <th>PO Number</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    let dataMap = new Map();
    let masterOrderNumbers = new Set();
    let isFirstFile = true;

    document.getElementById('fileInput').addEventListener('change', handleFiles);

    function formatDate(dateValue) {
      if (typeof dateValue === 'number') {
        const date = XLSX.SSF.parse_date_code(dateValue);
        if (date) {
          return `${date.y.toString().padStart(4, '0')}-${date.m.toString().padStart(2, '0')}-${date.d.toString().padStart(2, '0')}`;
        }
      }
      const date = new Date(dateValue);
      if (isNaN(date)) return dateValue;
      return date.toISOString().split('T')[0]; // Format: M/DD/YYY
    }

    function handleFiles(event) {
      const files = Array.from(event.target.files);

      files.forEach((file, index) => {
        const reader = new FileReader();

        reader.onload = function(e) {
          let json = [];

          if (file.name.endsWith('.csv')) {
            const csv = e.target.result;
            const workbook = XLSX.read(csv, { type: 'string' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            json = XLSX.utils.sheet_to_json(sheet);
          } else {
            const workbook = XLSX.read(e.target.result, { type: 'binary' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            json = XLSX.utils.sheet_to_json(sheet);
          }

          json.forEach(row => {
            const orderNumber = row["Order Number"] || row["Site Order ID"] || row["Order #"];
            if (!orderNumber) return;

            if (isFirstFile) {
              masterOrderNumbers.add(orderNumber);
            }

            if (!masterOrderNumbers.has(orderNumber)) return;

            const existing = dataMap.get(orderNumber) || {};
            const recipient = (row["Recipient"] || `${row["Shipping First Name"] || ''} ${row["Shipping Last Name"] || ''}`).trim();

            const updated = {
              "Order Date": formatDate(row["Order Date"] || existing["Order Date"] || ''),
              "Ship From": row["Ship From"] || existing["Ship From"] || '',
              "Order Number": orderNumber,
              "Item SKU": row["Item SKU"] || row["SKU"] || existing["Item SKU"] || '',
              "Quantity": row["Quantity"] || existing["Quantity"] || '',
              "Custom Field 1": row["Custom Field 1"] || existing["Custom Field 1"] || '',
              "Custom Field 2": row["Custom Field 2"] || existing["Custom Field 2"] || '',
              "Custom Field 3": row["Custom Field 3"] || existing["Custom Field 3"] || '',
              "Order Total": row["Order Total"] || existing["Order Total"] || '',
              "Recipient": recipient || existing["Recipient"] || '',
              "Rate": row["Rate"] || existing["Rate"] || '',
              "Service": row["Service"] || existing["Service"] || '',
              "Tracking Number": row["Tracking Number"] || existing["Tracking Number"] || '',
              "PO Number": row["PO Number"] || existing["PO Number"] || ''
            };

            dataMap.set(orderNumber, updated);
          });

          if (index === files.length - 1) {
            isFirstFile = false;
          }

          renderTable();
        };

        if (file.name.endsWith('.csv')) {
          reader.readAsText(file);
        } else {
          reader.readAsBinaryString(file);
        }
      });
    }

    function renderTable(filteredData = null) {
      const tbody = document.getElementById('reportTable').querySelector('tbody');
      tbody.innerHTML = '';

      const rows = filteredData || Array.from(dataMap.values());
      document.getElementById('totalOrders').textContent = `Total Orders: ${rows.length}`;

      for (let row of rows) {
        const tr = document.createElement('tr');
        for (let key of [
          "Order Date", "Ship From", "Order Number", "Item SKU", "Quantity",
          "Custom Field 1", "Custom Field 2", "Custom Field 3", "Order Total",
          "Recipient", "Rate", "Service", "Tracking Number", "PO Number"
        ]) {
          const td = document.createElement('td');
          td.textContent = row[key] || '';
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
    }

    function exportToExcel() {
      const worksheet = XLSX.utils.json_to_sheet(Array.from(dataMap.values()));
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, 'Sales Report');
      XLSX.writeFile(workbook, 'Sales_Report.xlsx');
    }

    function filterByDate() {
      const date = document.getElementById('dateFilter').value;
      if (!date) return renderTable();

      const filtered = Array.from(dataMap.values()).filter(row => row["Order Date"] && row["Order Date"].startsWith(date));
      renderTable(filtered);
    }

    function resetFilter() {
      dataMap.clear();
      masterOrderNumbers.clear();
      isFirstFile = true;

      document.getElementById('fileInput').value = '';
      document.getElementById('dateFilter').value = '';
      document.getElementById('totalOrders').textContent = 'Total Orders: 0';

      const tbody = document.getElementById('reportTable').querySelector('tbody');
      tbody.innerHTML = '';
    }
  </script>
</body>
</html>
