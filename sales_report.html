<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Report</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>
    body {font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f6f8fa; padding: 1.5rem; color: #2c3e50;}
    .header {display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;}
    .header img {height: 40px;}
    h1 {color: #2c3e50; font-weight: 500; font-size: 1.75rem; margin: 0;}
    .controls {display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; background: #ffffff; padding: 0.8rem 1rem; border-radius: 8px; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);}
    .left-controls {display: flex; flex-wrap: nowrap; gap: 0.75rem; align-items: center;}
    .controls input[type="file"] {max-width: 220px;}
    .controls input[type="file"],
    .controls input[type="date"],
    .controls button {padding: 0.4rem 0.8rem; font-size: 0.9rem; border: 1px solid #ccc; border-radius: 4px;}
    button {background-color: #5a9bd5; color: white; border: none; border-radius: 4px; cursor: pointer; transition: background-color 0.2s ease;}
    button:hover {background-color: #4a89c2;}
    #totalOrders{font-size:1rem;margin:0.75rem 0 0.5rem;color:#2c3e50;}
    #ordersByDate{font-size:0.95rem;margin:0.25rem 0 1rem;color:#2c3e50; white-space: pre-wrap;}
    table{width:100%;border-collapse:collapse;background-color:white;box-shadow:0 1px 4px rgba(0,0,0,0.03);border-radius:6px;overflow:hidden;}
    th{background-color:#2c3e50;color:white;padding:0.6rem 0.75rem;text-align:left;white-space:nowrap;font-weight:500;}
    td{padding:0.6rem 0.75rem;border-top:1px solid #e1e5ea;}
    tr:nth-child(even){background-color:#f9fbfc;}
    .styled-input {padding: 0.4rem 0.8rem; font-size: 0.9rem; border: 1px solid #ccc; border-radius: 4px; background: #f8fafc; color: #2c3e50; height: 34px; box-sizing: border-box; transition: border-color 0.2s;}
    .styled-input:focus {border-color: #5a9bd5; outline: none}
  </style>
</head>

<body>
  <div class="header">
    <h1>Sales Report</h1>
    <div><small>By: Christine Anastacio</small></div>
  </div>

  <div class="controls">
    <div class="left-controls">
      <input type="file" id="fileInput" multiple accept=".xlsx, .xls, .csv" />
      <button onclick="resetFilter()">Reset</button>
    </div>
    <div style="display: flex; align-items: center; gap: 0.5rem;">
      <label for="exportFilename" style="font-size: 0.9rem;">File Name:</label>
      <input type="text" id="exportFilename" placeholder="File name" class="styled-input" value="Sales_Report" />
      <button onclick="exportToExcel()">Export to Excel</button>
    </div>
  </div>

  <div id="totalOrders">Total Orders: 0</div>
  <div id="ordersByDate">Orders by Date:</div>

  <table id="reportTable">
    <thead>
      <tr>
        <th>Order Date</th><th>Ship From</th><th>Order Number</th><th>Item SKU</th><th>Quantity</th>
        <th>Custom Field 1</th><th>Custom Field 2</th><th>Custom Field 3</th><th>Order Total</th>
        <th>Recipient</th><th>Rate</th><th>Service</th><th>Tracking Number</th><th>PO Number</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    let masterDataRows = [];
    let masterOrderNumbers = new Set();
    let isFirstFile = true;

    document.getElementById('fileInput').addEventListener('change', handleFiles);

    function mapShipFrom(value) {
      switch (value) {
        case 'WooParts NJ':
        case 'AutoApex NJ':
        case 'KP360 NJ':
          return 'New Jersey Distribution Warehouse';
        case 'WooParts IL':
        case 'AutoApex IL':
        case 'KP360 IL':
          return 'Chicago Distribution Warehouse';
        case 'WooParts GA':
        case 'AutoApex GA':
        case 'KP360 GEORGIA':
          return 'Georgia Distribution Warehouse';
        case 'WooParts CA':
        case 'AutoApex CA':
        case 'KP360 CALI':
          return 'California Distribution Warehouse';
        default:
          return value;
      }
    }

    function formatDate(dateValue) {
      if (typeof dateValue === 'number') {
        const date = XLSX.SSF.parse_date_code(dateValue);
        if (date) {
          const mm = String(date.m).padStart(2, '0');
          const dd = String(date.d).padStart(2, '0');
          return `${mm}/${dd}/${date.y}`;
        }
      }
      const date = new Date(dateValue);
      if (isNaN(date)) return dateValue;
      const mm = String(date.getMonth() + 1).padStart(2, '0');
      const dd = String(date.getDate()).padStart(2, '0');
      const yyyy = date.getFullYear();
      return `${mm}/${dd}/${yyyy}`;
    }

    function handleFiles(event) {
      const files = Array.from(event.target.files);
      files.forEach((file, fileIdx) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          let json = [];
          if (file.name.endsWith('.csv')) {
            const csv = e.target.result;
            const workbook = XLSX.read(csv, { type: 'string' });
            json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
          } else {
            const workbook = XLSX.read(e.target.result, { type: 'binary' });
            json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
          }

          if (isFirstFile) {
            masterDataRows = [];
            masterOrderNumbers.clear();
            json.forEach(row => {
              const orderNumber = row["Order Number"] || row["Site Order ID"] || row["Order #"];
              if (!orderNumber) return;
              const recipient = (row["Recipient"] || `${row["Shipping First Name"]||''} ${row["Shipping Last Name"]||''}`).trim();
              masterDataRows.push({
                "Order Date": formatDate(row["Order Date"]||''),
                "Ship From": row["Ship From"] ? mapShipFrom(row["Ship From"]) : '',
                "Order Number": orderNumber,
                "Item SKU": row["Item SKU"]||row["SKU"]||'',
                "Quantity": row["Quantity"]||'',
                "Custom Field 1": row["Custom Field 1"]||'',
                "Custom Field 2": row["Custom Field 2"]||'',
                "Custom Field 3": row["Custom Field 3"]||'',
                "Order Total": row["Order Total"]||'',
                "Recipient": recipient,
                "Rate": row["Rate"]||'',
                "Service": (row["Service"]||'').replace(/®/g,''),
                "Tracking Number": row["Tracking Number"]||'',
                "PO Number": row["PO Number"]||''
              });
              masterOrderNumbers.add(orderNumber);
            });
            isFirstFile = false;
          } else {
            const updatesMap = new Map();
            json.forEach(row => {
              const orderNumber = row["Order Number"]||row["Site Order ID"]||row["Order #"];
              if (!orderNumber||!masterOrderNumbers.has(orderNumber)) return;
              if (!updatesMap.has(orderNumber)) updatesMap.set(orderNumber, []);
              updatesMap.get(orderNumber).push(row);
            });
            for (const [orderNumber, updateRows] of updatesMap.entries()) {
              let updateIdx = 0;
              for (let i = 0; i < masterDataRows.length && updateIdx < updateRows.length; i++) {
                if (masterDataRows[i]["Order Number"] === orderNumber) {
                  const updateRow = updateRows[updateIdx++];
                  for (const key in updateRow) {
                    if ((!masterDataRows[i][key]||masterDataRows[i][key]==='')&&
                        updateRow[key]!==undefined&&updateRow[key]!=='') {
                      masterDataRows[i][key] = updateRow[key];
                    }
                  }
                }
              }
            }
          }

          renderTable();
        };
        if (file.name.endsWith('.csv')) reader.readAsText(file);
        else reader.readAsBinaryString(file);
      });
    }

    function renderTable(filteredData = null) {
      const tbody = document.getElementById('reportTable').querySelector('tbody');
      tbody.innerHTML = '';
      const rows = filteredData || masterDataRows;
      document.getElementById('totalOrders').textContent = `Total Orders: ${rows.length}`;

      // compute orders per date
      const counts = {};
      rows.forEach(r => {
        const d = r["Order Date"];
        counts[d] = (counts[d]||0)+1;
      });
      const lines = Object.entries(counts).map(([d,c])=>`${d}: ${c}`);
      document.getElementById('ordersByDate').innerHTML = `Orders by Date:<br>${lines.join('<br>')}`;

      rows.forEach(row => {
        const tr = document.createElement('tr');
        [
          "Order Date","Ship From","Order Number","Item SKU","Quantity",
          "Custom Field 1","Custom Field 2","Custom Field 3","Order Total",
          "Recipient","Rate","Service","Tracking Number","PO Number"
        ].forEach(key => {
          const td = document.createElement('td');
          let cellValue = row[key]||'';
          if (key === "Service") cellValue = cellValue.replace(/®/g,'');
          if (key === "Ship From") cellValue = mapShipFrom(cellValue);
          td.textContent = cellValue;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    function exportToExcel() {
      let filename = document.getElementById('exportFilename').value.trim()||'Sales_Report';
      filename = filename.replace(/\.xlsx$/i,'');
      const table = document.getElementById('reportTable');
      const headers = Array.from(table.querySelectorAll('thead th')).map(th=>th.textContent.trim());
      const rows = Array.from(table.querySelectorAll('tbody tr')).map(tr=>
        Array.from(tr.querySelectorAll('td')).map(td=>td.textContent)
      );
      const data = rows.map(r=>{
        const obj = {};
        headers.forEach((h,i)=>obj[h]=r[i]);
        return obj;
      });
      const ws = XLSX.utils.json_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb,ws,'Sales Report');
      XLSX.writeFile(wb,filename + '.xlsx');
    }

    function resetFilter() {
      masterDataRows = [];
      masterOrderNumbers.clear();
      isFirstFile = true;
      document.getElementById('fileInput').value = '';
      document.getElementById('totalOrders').textContent = 'Total Orders: 0';
      document.getElementById('ordersByDate').textContent = 'Orders by Date:';
      document.querySelector('#reportTable tbody').innerHTML = '';
    }
  </script>
</body>
</html>
