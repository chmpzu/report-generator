<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Report</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <style>
    body {font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f6f8fa; padding: 1.5rem; color: #2c3e50;}
    .header {display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;}
    h1 {color: #2c3e50; font-weight: 500; font-size: 1.75rem; margin: 0;}
    .controls {display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; background: #ffffff; padding: 0.8rem 1rem; border-radius: 8px; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);}
    .left-controls {display: flex; gap: 0.75rem; align-items: center;}
    .controls input[type="file"] {max-width: 220px;}
    .controls input[type="file"], .controls button {padding: 0.4rem 0.8rem; font-size: 0.9rem; border: 1px solid #ccc; border-radius: 4px;}
    button {background-color: #5a9bd5; color: white; border: none; border-radius: 4px; cursor: pointer; transition: background-color 0.2s ease;}
    button:hover {background-color: #4a89c2;}
    #totalOrders{font-size:1rem;margin:0.75rem 0 0.5rem;color:#2c3e50;}
    #ordersByDate{font-size:0.95rem;margin:0.25rem 0 1rem;color:#2c3e50; white-space: nowrap;}
    table{width:100%;border-collapse:collapse;background-color:white;box-shadow:0 1px 4px rgba(0,0,0,0.03);border-radius:6px;overflow:hidden;}
    th{background-color:#2c3e50;color:white;padding:0.6rem 0.75rem;text-align:left;white-space:nowrap;font-weight:500;}
    td{padding:0.6rem 0.75rem;border-top:1px solid #e1e5ea;}
    tr:nth-child(even){background-color:#f9fbfc;}
  </style>
</head>

<body>
  <div class="header">
    <h1>Sales Report</h1>
    <div><small>By: Christine Anastacio</small></div>
  </div>

  <div class="controls">
    <div class="left-controls">
      <input type="file" id="fileInput" multiple accept=".xlsx, .xls, .csv" />
      <button onclick="resetFilter()">Reset</button>
    </div>
    <div style="display: flex; align-items: center; gap: 0.5rem;">
      <label for="exportFilename" style="font-size: 0.9rem;">File Name:</label>
      <input type="text" id="exportFilename" placeholder="File name" value="Sales_Report"
             style="padding:0.4rem 0.8rem; font-size:0.9rem; border:1px solid #ccc; border-radius:4px;" />
      <button onclick="exportToExcel()">Export to Excel</button>
    </div>
  </div>

  <div id="totalOrders">Total Orders: 0</div>
  <div id="ordersByDate">Orders by Date:</div>

  <table id="reportTable">
    <thead>
      <tr>
        <th>Order Date</th><th>Ship From</th><th>Order Number</th><th>Item SKU</th><th>Quantity</th>
        <th>Custom Field 1</th><th>Custom Field 2</th><th>Custom Field 3</th><th>Order Total</th>
        <th>Recipient</th><th>Rate</th><th>Service</th><th>Tracking Number</th><th>PO Number</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    let masterDataRows = [];
    let masterOrderNumbers = new Set();
    let isFirstFile = true;
    let updateFilesCount = 0;

    document.getElementById('fileInput').addEventListener('change', handleFiles);

    // NEW: helper to check if SKU has FBA
    function skuHasFBA(sku) {
      return ((sku || '') + '').toUpperCase().includes('FBA');
    }

    // --- Ship From helpers (PO Number first, then Item SKU with FBA priority) ---
    function containsCodeAlphaBoundary(str, token) {
      const s = (str || '').toUpperCase();
      const t = token.toUpperCase().replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const re = new RegExp(`(^|[^A-Z])${t}([^A-Z]|$)`);
      return re.test(s);
    }

    function computeShipFrom(row) {
      const po = ((row["PO Number"] || '') + '').toUpperCase();
      const skuRaw = row["Item SKU"] != null ? row["Item SKU"] : row["SKU"];
      const sku = ((skuRaw || '') + '').toUpperCase();

      if (po) {
        if (po.includes('CALIFORNIA') || containsCodeAlphaBoundary(po, 'CALI') || containsCodeAlphaBoundary(po, 'CA')) {
          return 'California Distribution Warehouse';
        }
        if (po.includes('GEORGIA') || containsCodeAlphaBoundary(po, 'GA')) {
          return 'Georgia Distribution Warehouse';
        }
        if (containsCodeAlphaBoundary(po, 'NJ')) {
          return 'New Jersey Distribution Warehouse';
        }
        if (containsCodeAlphaBoundary(po, 'IL')) {
          return 'Chicago Distribution Warehouse';
        }
      }

      if (sku.includes('FBA')) return 'FBA Warehouse';
      if (sku.includes('USA')) return 'Usauto Dropship';
      if (sku.includes('MLX')) return 'Meyer Dropship';

      return '';
    }

    function formatDate(dateValue) {
      if (typeof dateValue === 'number') {
        const d = XLSX.SSF.parse_date_code(dateValue);
        if (d) {
          return `${d.m}/${d.d}/${d.y}`;
        }
      }
      const dt = new Date(dateValue);
      if (isNaN(dt)) return dateValue;
      return `${dt.getMonth()+1}/${dt.getDate()}/${dt.getFullYear()}`;
    }

    function handleFiles(event) {
      const files = Array.from(event.target.files);
      files.forEach((file, fileIdx) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          let json = [];
          if (file.name.endsWith('.csv')) {
            const wb = XLSX.read(e.target.result, {type:'string'});
            json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
          } else {
            const wb = XLSX.read(e.target.result, {type:'binary'});
            json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
          }

          if (isFirstFile) {
            masterDataRows = [];
            masterOrderNumbers.clear();
            json.forEach(row => {
              const ord = row["Order Number"]||row["Site Order ID"]||row["Order #"];
              if (!ord) return;
              const rec = (row["Recipient"]||`${row["Shipping First Name"]||''} ${row["Shipping Last Name"]||''}`).trim();
              const itemSku = row["Item SKU"]||row["SKU"]||'';
              const computedShipFrom = computeShipFrom(row);

              // Apply FBA → Custom Field 1 rule
              let cf1 = row["Custom Field 1"]||'';
              if (skuHasFBA(itemSku)) cf1 = itemSku;

              masterDataRows.push({
                "Order Date": formatDate(row["Order Date"]||''),
                "Ship From": computedShipFrom,
                "Order Number": ord,
                "Item SKU": itemSku,
                "Quantity": row["Quantity"]||'',
                "Custom Field 1": cf1,
                "Custom Field 2": row["Custom Field 2"]||'',
                "Custom Field 3": row["Custom Field 3"]||'',
                "Order Total": row["Order Total"]||'',
                "Recipient": rec,
                "Rate": row["Rate"]||'',
                "Service": (row["Service"]||'').replace(/®/g,''),
                "Tracking Number": row["Tracking Number"]||'',
                "PO Number": row["PO Number"]||''
              });
              masterOrderNumbers.add(ord);
            });
            isFirstFile = false;
          } else {
            const updates = new Map();
            json.forEach(r => {
              const ord = r["Order Number"]||r["Site Order ID"]||r["Order #"];
              if (!ord || !masterOrderNumbers.has(ord)) return;
              if (!updates.has(ord)) updates.set(ord, []);
              updates.get(ord).push(r);
            });

            updates.forEach((rows, ord) => {
              let idx = 0;
              for (let i = 0; i < masterDataRows.length && idx < rows.length; i++) {
                if (masterDataRows[i]["Order Number"] === ord) {
                  const u = rows[idx++];
                  for (const k in u) {
                    if ((!masterDataRows[i][k] || masterDataRows[i][k] === '') && u[k] !== undefined && u[k] !== '') {
                      masterDataRows[i][k] = u[k];
                    }
                  }
                }
              }
            });

            // Recompute Ship From and CF1 after updates
            masterDataRows = masterDataRows.map(r => {
              const updated = { ...r, "Ship From": computeShipFrom(r) };
              if (skuHasFBA(r["Item SKU"])) {
                updated["Custom Field 1"] = r["Item SKU"];
              }
              return updated;
            });

            updateFilesCount++;
          }

          renderTable();
        };
        if (file.name.endsWith('.csv')) reader.readAsText(file);
        else reader.readAsBinaryString(file);
      });
    }

    function renderTable(filteredData = null) {
      const tbody = document.getElementById('reportTable').querySelector('tbody');
      tbody.innerHTML = '';
      const rows = filteredData || masterDataRows;
      document.getElementById('totalOrders').textContent = `Total Orders: ${rows.length}`;

      const counts = {};
      rows.forEach(r => {
        counts[r["Order Date"]] = (counts[r["Order Date"]] || 0) + 1;
      });
      const parts = Object.entries(counts).map(([d,c]) => `${d}: ${c}`);
      document.getElementById('ordersByDate').textContent =
        `Orders by Date: ${parts.join('    |    ')}`;

      rows.forEach(row => {
        const tr = document.createElement('tr');
        [
          "Order Date","Ship From","Order Number","Item SKU","Quantity",
          "Custom Field 1","Custom Field 2","Custom Field 3","Order Total",
          "Recipient","Rate","Service","Tracking Number","PO Number"
        ].forEach(key => {
          let val = row[key] || '';
          if (key === "Service") val = val.replace(/®/g,'');
          const td = document.createElement('td');
          td.textContent = val;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    function exportToExcel() {
      let fn = document.getElementById('exportFilename').value.trim() || 'Sales_Report';
      fn = fn.replace(/\.xlsx$/i,'');
      const tbl = document.getElementById('reportTable');
      const headers = Array.from(tbl.querySelectorAll('thead th')).map(th => th.textContent.trim());
      const data = Array.from(tbl.querySelectorAll('tbody tr')).map(tr =>
        Array.from(tr.querySelectorAll('td')).map(td => td.textContent)
      ).map(r => Object.fromEntries(r.map((c,i) => [headers[i], c])));
      const ws = XLSX.utils.json_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Sales Report');
      XLSX.writeFile(wb, fn + '.xlsx');
    }

    function resetFilter() {
      masterDataRows = [];
      masterOrderNumbers.clear();
      isFirstFile = true;
      updateFilesCount = 0;
      document.getElementById('fileInput').value = '';
      document.getElementById('totalOrders').textContent = 'Total Orders: 0';
      document.getElementById('ordersByDate').textContent = 'Orders by Date:'; 
      document.querySelector('#reportTable tbody').innerHTML = '';
    }
  </script>
</body>
</html>
