<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Net Profit Margin Calculator</title>
  <style>
    /* Full page style for body and container */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f4f4f4;
    }

    .container {
      width: 100%;
      height: 100%;
      padding: 20px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: white;
      overflow: auto;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 1.5em;
      text-align: center;
    }

    table {
      width: 100%;
      height: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      table-layout: fixed; /* Ensure all columns take equal space */
    }

    th, td {
      padding: 10px;
      text-align: center;
      border: 1px solid #ddd;
      word-wrap: break-word;
    }

    th {
      background-color: #007bff;
      color: white;
    }

    input[type="number"], input[type="text"] {
      width: 95%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
      text-align: right;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background-color: #0056b3;
    }

    /* Ensure the table content stays scrollable when there are many rows */
    tbody {
      display: block;
      overflow-y: auto;
      height: calc(100vh - 200px); /* Adjust the table height */
    }

    thead, tbody tr {
      display: table;
      width: 100%;
      table-layout: fixed;
    }

    /* Style for the 'Add New Entry' button aligned to the right */
    .add-row-btn-container {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
      width: 100%;
    }

    .add-row-btn-container button {
      width: auto;
    }

  </style>
</head>
<body>
  <div class="container">
    <h1>Net Profit Margin (NPM) Calculator</h1>
    
    <table id="npmTable">
      <thead>
        <tr>
          <th>Site Order ID</th>
          <th>Quantity</th>
          <th>Unit Sales Price</th>
          <th>Total Tax Price</th>
          <th>Total Shipping Paid</th>
          <th>Sales Order Total</th>
          <th>Supplier Cost</th>
          <th>Total Supplier Cost</th>
          <th>SS Shipping Price</th>
          <th>Merchant / List Fee</th>
          <th>Total Cost</th>
          <th>Net Profit</th>
          <th>NPM (%)</th>
        </tr>
      </thead>
      <tbody>
        <!-- Rows will be dynamically added here -->
      </tbody>
    </table>

    <div class="add-row-btn-container">
      <button id="addRowBtn">Add New Entry</button>
    </div>
  </div>

  <script>
    // script.js

    // Function to update localStorage with the current table data
    function updateLocalStorage() {
      const rows = document.querySelectorAll('#npmTable tbody tr');
      const tableData = [];

      rows.forEach(row => {
        const rowData = {
          siteOrderId: row.querySelector('.site-order-id').value,
          quantity: parseFloat(row.querySelector('.quantity').value),
          unitSalesPrice: parseFloat(row.querySelector('.unit-sales-price').value),
          totalTaxPrice: parseFloat(row.querySelector('.total-tax-price').value),
          totalShippingPaid: parseFloat(row.querySelector('.total-shipping-paid').value),
          supplierCost: parseFloat(row.querySelector('.supplier-cost').value),
          ssShippingPrice: parseFloat(row.querySelector('.ss-shipping-price').value),
          salesOrderTotal: parseFloat(row.querySelector('.sales-order-total').textContent),
          totalSupplierCost: parseFloat(row.querySelector('.total-supplier-cost').textContent),
          merchantListFee: parseFloat(row.querySelector('.merchant-list-fee').textContent),
          totalCost: parseFloat(row.querySelector('.total-cost').textContent),
          netProfit: parseFloat(row.querySelector('.net-profit').textContent),
          npm: parseFloat(row.querySelector('.npm-result').textContent),
        };
        tableData.push(rowData);
      });

      localStorage.setItem('npmData', JSON.stringify(tableData));
    }

    // Function to load data from localStorage
    function loadFromLocalStorage() {
      const savedData = localStorage.getItem('npmData');
      if (savedData) {
        const tableData = JSON.parse(savedData);
        tableData.forEach(rowData => {
          addNewRow(rowData);
        });
      }
    }

    // Function to add a new row to the table
    function addNewRow(rowData = {}) {
      const tableBody = document.querySelector('#npmTable tbody');
      const newRow = document.createElement('tr');

      newRow.innerHTML = `
        <td><input type="text" class="site-order-id" value="${rowData.siteOrderId || ''}" /></td>
        <td><input type="number" class="quantity" value="${rowData.quantity || ''}" /></td>
        <td><input type="number" class="unit-sales-price" value="${rowData.unitSalesPrice || ''}" /></td>
        <td><input type="number" class="total-tax-price" value="${rowData.totalTaxPrice || ''}" /></td>
        <td><input type="number" class="total-shipping-paid" value="${rowData.totalShippingPaid || ''}" /></td>
        <td><span class="sales-order-total">${rowData.salesOrderTotal || '0'}</span></td>
        <td><input type="number" class="supplier-cost" value="${rowData.supplierCost || ''}" /></td>
        <td><span class="total-supplier-cost">${rowData.totalSupplierCost || '0'}</span></td>
        <td><input type="number" class="ss-shipping-price" value="${rowData.ssShippingPrice || ''}" /></td>
        <td><span class="merchant-list-fee">${rowData.merchantListFee || '0'}</span></td>
        <td><span class="total-cost">${rowData.totalCost || '0'}</span></td>
        <td><span class="net-profit">${rowData.netProfit || '0'}</span></td>
        <td><span class="npm-result">${rowData.npm || '0'}</span></td>
      `;
      
      tableBody.appendChild(newRow);
      addInputListeners(newRow);
    }

    // Function to add event listeners to inputs for automatic calculations
    function addInputListeners(row) {
      const inputs = row.querySelectorAll('input');
      
      inputs.forEach(input => {
        input.addEventListener('input', function() {
          // Auto-calculate NPM values
          const quantity = parseFloat(row.querySelector('.quantity').value);
          const unitSalesPrice = parseFloat(row.querySelector('.unit-sales-price').value);
          const totalTaxPrice = parseFloat(row.querySelector('.total-tax-price').value);
          const totalShippingPaid = parseFloat(row.querySelector('.total-shipping-paid').value);
          const supplierCost = parseFloat(row.querySelector('.supplier-cost').value);
          const ssShippingPrice = parseFloat(row.querySelector('.ss-shipping-price').value);

          if (isNaN(quantity) || isNaN(unitSalesPrice) || isNaN(totalTaxPrice) ||
              isNaN(totalShippingPaid) || isNaN(supplierCost) || isNaN(ssShippingPrice) || quantity <= 0) {
            return;
          }

          const salesOrderTotal = unitSalesPrice + totalTaxPrice + totalShippingPaid;
          const totalSupplierCost = supplierCost * quantity;
          const merchantListFee = salesOrderTotal * 0.15;
          const totalCost = totalSupplierCost + ssShippingPrice + merchantListFee;
          const netProfit = salesOrderTotal - totalCost - totalTaxPrice;
          const npm = (netProfit / salesOrderTotal) * 100;

          row.querySelector('.sales-order-total').textContent = salesOrderTotal.toFixed(2);
          row.querySelector('.total-supplier-cost').textContent = totalSupplierCost.toFixed(2);
          row.querySelector('.merchant-list-fee').textContent = merchantListFee.toFixed(2);
          row.querySelector('.total-cost').textContent = totalCost.toFixed(2);
          row.querySelector('.net-profit').textContent = netProfit.toFixed(2);
          row.querySelector('.npm-result').textContent = npm.toFixed(2) + '%';

          // Save data to localStorage after every change
          updateLocalStorage();
        });
      });
    }

    // Add a new row when the "Add New Entry" button is clicked
    document.getElementById('addRowBtn').addEventListener('click', function() {
      addNewRow();
    });

    // Load any saved data when the page loads
    window.addEventListener('load', function() {
      loadFromLocalStorage();
    });
  </script>
</body>
</html>
